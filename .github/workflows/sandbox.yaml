name: ⚙️ Sandbox
on:
  push: 
  workflow_dispatch:

permissions:
  contents: write
  
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: |
          mkdir -p dummies
          for i in {1..500}; do date > "dummies/dummy_$i.txt"; done
          git add .

      - uses: qoomon/actions--create-commit@main
        id: commit
        with:
          message: work work
          skip-empty: true

      - run: git push
      
